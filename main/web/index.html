<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Control Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="glass-container">
        <!-- Main Screen -->
        <div id="main-screen">
            <header>
                <h1 id="title">Lizarte On! Configurator</h1>
                <div class="lang-selector">
                    <select id="language-select" onchange="changeLanguage()">
                        <option value="es" selected>Español</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                    </select>
                </div>
            </header>

            <main>
                <div class="status-card">
                    <p id="status-text">Dispositivo conectado y listo.</p>
                </div>

                <div class="button-group">
                    <button id="btn-1" class="action-btn" onclick="startAction('action1')">
                        <span class="btn-icon">⚡</span>
                        <span class="btn-text">Acción 1</span>
                    </button>
                    <button id="btn-2" class="action-btn" onclick="startAction('action2')">
                        <span class="btn-icon">⚙️</span>
                        <span class="btn-text">Acción 2</span>
                    </button>
                </div>
            </main>
        </div>

        <!-- Step Screen -->
        <div id="step-screen" class="hidden">
            <header>
                <button class="back-btn" onclick="showMainScreen()">←</button>
                <h2 id="step-action-title">Título Acción</h2>
            </header>

            <div class="step-content">
                <div class="step-indicator">
                    <span id="current-step-num">1</span>/<span id="total-steps-num">3</span>
                </div>
                <p id="step-description">Descripción del paso...</p>
                <div id="key-debug" class="debug-card hidden">
                    <span class="debug-label">Respuesta RX:</span>
                    <span id="key-debug-value">---</span>
                </div>
                <div id="step2-selector" class="selector-card hidden">
                    <div class="selector-title">Configuración del byte XX</div>

                    <div class="selector-group">
                        <div class="selector-subtitle">Bits 0-1 (selección única)</div>
                        <label class="selector-option">
                            <input type="checkbox" id="bit0-dsr">
                            Bit 0 — DSR (activar o no)
                        </label>
                        <label class="selector-option">
                            <input type="checkbox" id="bit1-parking">
                            Bit 1 — Asistente aparcamiento (activar o no)
                        </label>
                    </div>

                    <div class="selector-group">
                        <div class="selector-subtitle">Bits 2-3 (TSC, selección única)</div>
                        <label class="selector-option">
                            <input type="radio" name="tsc" value="0x00" checked>
                            00 — TSC desactivado
                        </label>
                        <label class="selector-option">
                            <input type="radio" name="tsc" value="0x04">
                            04 — TSC con Lernwerten
                        </label>
                        <label class="selector-option">
                            <input type="radio" name="tsc" value="0x08">
                            08 — TSC sin ValoresApr.
                        </label>
                    </div>

                    <div class="selector-group">
                        <div class="selector-subtitle">Bits 4, 5 y 7 (selección múltiple)</div>
                        <label class="selector-option">
                            <input type="checkbox" id="bit4-lane">
                            Bit 4 — Asistente mantenimiento carril
                        </label>
                        <label class="selector-option">
                            <input type="checkbox" id="bit5-angle">
                            Bit 5 — Sensor ángulo dirección externo
                        </label>
                        <label class="selector-option">
                            <input type="checkbox" id="bit7-profile">
                            Bit 7 — Perfil conductor activo
                        </label>
                    </div>

                    <div class="selector-result">
                        <span>XX:</span>
                        <span id="xx-value">0x85</span>
                    </div>
                </div>

                <div class="progress-bar">
                    <div id="progress-inner"></div>
                </div>

                <div class="control-group">
                    <button id="next-step-btn" class="primary-btn" onclick="executeStep()">
                        Siguiente Paso
                    </button>
                </div>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
